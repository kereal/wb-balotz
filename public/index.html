<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WB Scraper - Баллы за отзыв</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .product-img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      background: #1f2937;
    }
    .row-hover:hover {
      background: rgba(124, 58, 237, 0.1);
    }
    .points-badge {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #000;
      font-weight: 700;
    }
    .scrollbar-thin::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .scrollbar-thin::-webkit-scrollbar-track {
      background: #1f2937;
    }
    .scrollbar-thin::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 3px;
    }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-xl">🎯</span>
          <div>
            <h1 class="text-lg font-bold text-purple-400">WB Баллы за отзыв</h1>
          </div>
        </div>
        <div class="flex items-center gap-2 text-xs text-gray-500">
          <span id="stat-new" class="text-green-400 font-bold">-</span> новых
          <span class="text-gray-700">|</span>
          <span id="stat-total">-</span> всего
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-4">
    <!-- Controls -->
    <div class="flex flex-wrap items-center gap-3 mb-4">
      <div class="flex bg-gray-900 border border-gray-800 rounded-lg p-1">
        <button class="tab px-3 py-1.5 rounded text-sm font-medium transition-all active bg-purple-600 text-white" data-tab="new">
          🆕 Новые
        </button>
        <button class="tab px-3 py-1.5 rounded text-sm font-medium transition-all text-gray-400" data-tab="all">
          📦 Все
        </button>
        <button class="tab px-3 py-1.5 rounded text-sm font-medium transition-all text-gray-400" data-tab="history">
          📜 История
        </button>
      </div>
      
      <input type="text" id="search" placeholder="Поиск..." 
        class="flex-1 min-w-[150px] px-3 py-1.5 bg-gray-900 border border-gray-800 rounded-lg text-sm focus:outline-none focus:border-purple-500">
      
      <select id="minPoints" class="px-3 py-1.5 bg-gray-900 border border-gray-800 rounded-lg text-sm focus:outline-none focus:border-purple-500">
        <option value="0">Все баллы</option>
        <option value="10">10+ баллов</option>
        <option value="25">25+ баллов</option>
        <option value="50">50+ баллов</option>
        <option value="100">100+ баллов</option>
      </select>

      <button onclick="loadProducts(currentTab)" class="px-3 py-1.5 bg-gray-800 border border-gray-700 rounded-lg text-sm hover:border-purple-500 transition-colors">
        🔄
      </button>
    </div>

    <!-- Table Header -->
    <div id="table-header" class="hidden md:grid grid-cols-12 gap-2 px-3 py-2 text-xs text-gray-500 border-b border-gray-800 bg-gray-900/50 rounded-t-lg">
      <div class="col-span-1">Фото</div>
      <div class="col-span-4">Название</div>
      <div class="col-span-2">Бренд</div>
      <div class="col-span-1 text-right">Цена</div>
      <div class="col-span-1 text-center">Баллы</div>
      <div class="col-span-1 text-center">Рейтинг</div>
      <div class="col-span-2 text-right">Действие</div>
    </div>

    <!-- Products List -->
    <div id="products" class="space-y-1">
      <div class="text-center py-20 text-gray-500">Загрузка...</div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center items-center gap-4 mt-6"></div>
  </main>

  <script>
    let currentTab = 'new';
    let currentPage = 0;
    let currentMinPoints = 0;
    const limit = 50;

    // WB Image URL - правильный формат
    function getWbImageUrl(id) {
      if (!id) return '';
      const vol = Math.floor(id / 100000);
      const part = Math.floor(id / 1000);
      // WB использует basket-01 до basket-12
      const basket = vol >= 1000 ? Math.floor(vol / 100) : 0;
      const basketNum = basket > 0 ? String(basket + 1).padStart(2, '0') : '01';
      return `https://basket-${basketNum}.wbbasket.ru/vol${vol}/part${part}/${id}/images/tine/1.webp`;
    }

    // Alternative image URLs to try
    function getImageUrls(id) {
      if (!id) return [];
      const vol = Math.floor(id / 100000);
      const part = Math.floor(id / 1000);
      return [
        `https://basket-01.wbbasket.ru/vol${vol}/part${part}/${id}/images/tine/1.webp`,
        `https://basket-02.wbbasket.ru/vol${vol}/part${part}/${id}/images/tine/1.webp`,
        `https://basket-05.wbbasket.ru/vol${vol}/part${part}/${id}/images/tine/1.webp`,
        `https://basket-10.wbbasket.ru/vol${vol}/part${part}/${id}/images/tine/1.webp`,
        `https://images.wbstatic.net/tine/${id}.jpg`,
      ];
    }

    function formatPrice(price) {
      return new Intl.NumberFormat('ru-RU').format(price);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const json = await res.json();
        if (json.success) {
          document.getElementById('stat-total').textContent = json.data.total || 0;
          document.getElementById('stat-new').textContent = json.data.new_count || 0;
        }
      } catch (e) {}
    }

    async function loadProducts(tab = 'new', search = '', page = 0) {
      const container = document.getElementById('products');
      const tableHeader = document.getElementById('table-header');
      const pagination = document.getElementById('pagination');

      container.innerHTML = '<div class="text-center py-10 text-gray-500">⏳ Загрузка...</div>';
      pagination.innerHTML = '';

      try {
        let url;
        const params = new URLSearchParams({
          limit: limit,
          offset: page * limit,
          minPoints: currentMinPoints
        });

        if (tab === 'history') {
          url = '/api/history?limit=50';
          tableHeader.classList.add('hidden');
        } else if (search) {
          url = `/api/search?q=${encodeURIComponent(search)}&${params}`;
          tableHeader.classList.remove('hidden');
        } else {
          url = `/api/${tab}?${params}`;
          tableHeader.classList.remove('hidden');
        }

        const res = await fetch(url);
        const json = await res.json();

        if (!json.success) throw new Error(json.error);

        const data = json.data;
        const total = json.total || data.length;

        if (tab === 'history') {
          renderHistory(data, total);
          return;
        }

        if (data.length === 0) {
          container.innerHTML = `
            <div class="text-center py-16 text-gray-500">
              <div class="text-3xl mb-2">📦</div>
              <p>Нет товаров</p>
            </div>`;
          return;
        }

        // Render as list rows
        container.innerHTML = data.map(p => `
          <a href="${p.url}" target="_blank" 
            class="row-hover grid grid-cols-12 gap-2 items-center px-3 py-2 bg-gray-900/30 border border-gray-800/50 rounded-lg transition-colors">
            
            <!-- Image -->
            <div class="col-span-2 md:col-span-1">
              <img class="product-img" 
                src="https://images.wbstatic.net/c252x336/new/${String(p.wb_id).slice(0, -4)}0000/${p.wb_id}-1.jpg"
                onerror="this.onerror=null; this.src='https://images.wbstatic.net/tine/${p.wb_id}.jpg'; this.onerror=function(){this.style.display='none'; this.parentElement.innerHTML='<div class=\\'w-[60px] h-[60px] bg-gray-800 rounded flex items-center justify-center text-xl\\'>📦</div>'}"
                loading="lazy">
            </div>
            
            <!-- Name -->
            <div class="col-span-10 md:col-span-4">
              <div class="text-sm text-gray-200 line-clamp-2 leading-tight">${escapeHtml(p.name)}</div>
            </div>
            
            <!-- Brand -->
            <div class="hidden md:block md:col-span-2">
              <span class="text-xs text-purple-400">${escapeHtml(p.brand) || '-'}</span>
            </div>
            
            <!-- Price -->
            <div class="hidden md:block md:col-span-1 text-right">
              <span class="text-green-400 font-bold text-sm">${formatPrice(p.sale_price || p.price)}₽</span>
              ${p.price !== p.sale_price && p.sale_price ? `<div class="text-xs text-gray-600 line-through">${formatPrice(p.price)}₽</div>` : ''}
            </div>
            
            <!-- Points -->
            <div class="hidden md:block md:col-span-1 text-center">
              ${p.feedback_points > 0 ? `
                <span class="points-badge inline-block px-2 py-0.5 rounded text-xs">
                  🎁 ${p.feedback_points}
                </span>
              ` : '<span class="text-gray-600">-</span>'}
            </div>
            
            <!-- Rating -->
            <div class="hidden md:block md:col-span-1 text-center">
              <span class="text-xs">
                ${p.review_rating > 0 ? `⭐ ${p.review_rating.toFixed(1)}` : '-'}
                ${p.feedbacks > 0 ? `<span class="text-gray-500">(${p.feedbacks})</span>` : ''}
              </span>
            </div>
            
            <!-- Action -->
            <div class="hidden md:flex md:col-span-2 justify-end gap-2">
              <span class="text-xs text-gray-500">${escapeHtml(p.seller?.substring(0, 15)) || ''}</span>
              <span class="text-purple-400 text-sm">→</span>
            </div>
          </a>
        `).join('');

        // Pagination
        if (total > limit && !search) {
          const pages = Math.ceil(total / limit);
          pagination.innerHTML = `
            <button ${page === 0 ? 'disabled' : ''} 
              onclick="loadProducts('${tab}', '', ${page - 1})"
              class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm disabled:opacity-30 hover:border-purple-500">
              ←
            </button>
            <span class="text-gray-500 text-sm">${page + 1} / ${pages} (${total})</span>
            <button ${page >= pages - 1 ? 'disabled' : ''} 
              onclick="loadProducts('${tab}', '', ${page + 1})"
              class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm disabled:opacity-30 hover:border-purple-500">
              →
            </button>
          `;
        }

      } catch (e) {
        container.innerHTML = `<div class="text-center py-10 text-red-400">❌ ${escapeHtml(e.message)}</div>`;
      }
    }

    function renderHistory(data, total) {
      const container = document.getElementById('products');
      
      container.innerHTML = `
        <div class="space-y-2">
          ${data.map(h => `
            <div class="flex items-center justify-between px-4 py-3 bg-gray-900/30 border border-gray-800/50 rounded-lg">
              <div class="flex items-center gap-4">
                <span class="${h.status === 'success' ? 'text-green-400' : 'text-red-400'} text-lg">
                  ${h.status === 'success' ? '✓' : '✗'}
                </span>
                <div>
                  <div class="text-sm text-gray-300">${h.started_at}</div>
                  <div class="text-xs text-gray-500">
                    Найдено: <span class="text-gray-300">${h.products_found}</span>
                    · Новых: <span class="text-green-400">${h.new_products}</span>
                  </div>
                </div>
              </div>
              <span class="px-2 py-1 rounded text-xs ${h.status === 'success' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
                ${h.status === 'success' ? 'OK' : 'Error'}
              </span>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => {
          t.classList.remove('active', 'bg-purple-600', 'text-white');
          t.classList.add('text-gray-400');
        });
        tab.classList.add('active', 'bg-purple-600', 'text-white');
        tab.classList.remove('text-gray-400');
        currentTab = tab.dataset.tab;
        currentPage = 0;
        document.getElementById('search').value = '';
        loadProducts(currentTab);
      });
    });

    // Search
    let searchTimeout;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        loadProducts(null, e.target.value.trim());
      }, 300);
    });

    // Min points
    document.getElementById('minPoints').addEventListener('change', (e) => {
      currentMinPoints = parseInt(e.target.value);
      currentPage = 0;
      loadProducts(currentTab);
    });

    // Init
    loadStats();
    loadProducts('new');
    setInterval(loadStats, 60000);
  </script>
</body>
</html>
