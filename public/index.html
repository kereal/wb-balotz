<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WB Scraper - Баллы за отзыв</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wb: { purple: '#7c3aed', pink: '#ec4899', orange: '#f59e0b' }
          }
        }
      }
    }
  </script>
  <style>
    .product-img { 
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
    }
    .product-img img {
      transition: transform 0.3s ease;
    }
    .product-img img:hover {
      transform: scale(1.05);
    }
    .points-glow {
      text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
    }
    .price-glow {
      text-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
    }
    .card-hover {
      transition: all 0.2s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(124, 58, 237, 0.3);
    }
    @keyframes pulse-points {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }
    .animate-pulse-slow {
      animation: pulse-points 2s ease-in-out infinite;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <!-- Header -->
  <header class="bg-gradient-to-r from-gray-900 via-gray-900 to-purple-950 border-b border-gray-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="text-2xl">🎯</div>
          <div>
            <h1 class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
              WB Баллы за отзыв
            </h1>
            <p class="text-xs text-gray-500">Отслеживание новых товаров</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button onclick="loadProducts(currentTab)" class="p-2 text-gray-400 hover:text-purple-400 transition-colors" title="Обновить">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="stats">
      <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 text-center">
        <div class="text-2xl font-bold text-purple-400" id="stat-total">-</div>
        <div class="text-xs text-gray-500 mt-1">Всего товаров</div>
      </div>
      <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 text-center">
        <div class="text-2xl font-bold text-green-400" id="stat-new">-</div>
        <div class="text-xs text-gray-500 mt-1">Новых</div>
      </div>
      <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 text-center">
        <div class="text-2xl font-bold text-amber-400" id="stat-points">-</div>
        <div class="text-xs text-gray-500 mt-1">С баллами</div>
      </div>
      <div class="bg-gray-900/50 border border-gray-800 rounded-xl p-4 text-center">
        <div class="text-2xl font-bold text-blue-400" id="stat-success">-</div>
        <div class="text-xs text-gray-500 mt-1">Сканирований</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap items-center gap-3 mb-6">
      <div class="flex bg-gray-900/50 border border-gray-800 rounded-lg p-1">
        <button class="tab px-4 py-2 rounded-md text-sm font-medium transition-all active" data-tab="new">
          🆕 Новые
        </button>
        <button class="tab px-4 py-2 rounded-md text-sm font-medium transition-all" data-tab="all">
          📦 Все
        </button>
        <button class="tab px-4 py-2 rounded-md text-sm font-medium transition-all" data-tab="history">
          📜 История
        </button>
      </div>
      
      <div class="flex-1 min-w-[200px]">
        <input type="text" id="search" placeholder="Поиск по названию или бренду..." 
          class="w-full px-4 py-2 bg-gray-900/50 border border-gray-800 rounded-lg text-sm focus:outline-none focus:border-purple-500 transition-colors">
      </div>
      
      <div class="flex items-center gap-2">
        <label class="text-xs text-gray-500">Мин. баллы:</label>
        <select id="minPoints" class="px-3 py-2 bg-gray-900/50 border border-gray-800 rounded-lg text-sm focus:outline-none focus:border-purple-500">
          <option value="0">Все</option>
          <option value="10">10+</option>
          <option value="25">25+</option>
          <option value="50">50+</option>
          <option value="100">100+</option>
        </select>
      </div>
    </div>

    <!-- Count -->
    <div class="flex items-center justify-between mb-4">
      <div class="text-sm text-gray-500" id="count"></div>
      <div class="text-xs text-gray-600" id="last-update"></div>
    </div>

    <!-- Products Grid -->
    <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <div class="col-span-full text-center py-20 text-gray-500">
        <div class="text-4xl mb-4">⏳</div>
        <p>Загрузка...</p>
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="flex justify-center items-center gap-4 mt-8"></div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-8 text-gray-600 text-xs">
    WB Scraper v2.1 | Данные обновляются автоматически
  </footer>

  <script>
    let currentTab = 'new';
    let currentPage = 0;
    let currentMinPoints = 0;
    const limit = 32;

    // WB Image URL helper
    function getWbImageUrl(id) {
      if (!id) return '';
      const vol = Math.floor(id / 100000);
      const part = Math.floor(id / 1000);
      const basket = Math.floor(vol / 100) + 1;
      return `https://basket-${String(basket).padStart(2, '0')}.wb.ru/vol${vol}/part${part}/${id}/images/c246x328.webp`;
    }

    // Format price
    function formatPrice(price) {
      return new Intl.NumberFormat('ru-RU').format(price);
    }

    // Escape HTML
    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load stats
    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const json = await res.json();
        if (json.success) {
          const s = json.data;
          document.getElementById('stat-total').textContent = s.total || 0;
          document.getElementById('stat-new').textContent = s.new_count || 0;
          document.getElementById('stat-points').textContent = s.with_points || 0;
          document.getElementById('stat-success').textContent = s.success_scans || 0;
        }
      } catch (e) {
        console.error('Stats error:', e);
      }
    }

    // Load products
    async function loadProducts(tab = 'new', search = '', page = 0) {
      const container = document.getElementById('products');
      const countEl = document.getElementById('count');
      const pagination = document.getElementById('pagination');
      const lastUpdate = document.getElementById('last-update');

      container.innerHTML = `
        <div class="col-span-full text-center py-20 text-gray-500">
          <div class="text-4xl mb-4">⏳</div>
          <p>Загрузка...</p>
        </div>
      `;
      countEl.textContent = '';
      pagination.innerHTML = '';

      try {
        let url;
        const params = new URLSearchParams({
          limit: limit,
          offset: page * limit,
          minPoints: currentMinPoints
        });

        if (tab === 'history') {
          url = '/api/history?limit=30';
        } else if (search) {
          url = `/api/search?q=${encodeURIComponent(search)}&${params}`;
        } else {
          url = `/api/${tab}?${params}`;
        }

        const res = await fetch(url);
        const json = await res.json();

        if (!json.success) {
          throw new Error(json.error || 'Ошибка загрузки');
        }

        const data = json.data;
        const total = json.total || data.length;
        lastUpdate.textContent = `Обновлено: ${new Date().toLocaleTimeString('ru-RU')}`;

        if (tab === 'history') {
          renderHistory(data);
          return;
        }

        countEl.textContent = `Найдено: ${total} товаров`;

        if (data.length === 0) {
          container.innerHTML = `
            <div class="col-span-full text-center py-20 text-gray-500">
              <div class="text-4xl mb-4">📦</div>
              <p>Нет товаров</p>
              <p class="text-sm mt-2 text-gray-600">Запустите scraper.js для поиска</p>
            </div>
          `;
          return;
        }

        container.innerHTML = data.map(p => `
          <a href="${p.url}" target="_blank" 
            class="card-hover bg-gray-900/30 border border-gray-800 rounded-xl overflow-hidden group">
            <!-- Image -->
            <div class="product-img aspect-square relative overflow-hidden">
              <img src="${getWbImageUrl(p.wb_id)}" 
                alt="${escapeHtml(p.name)}"
                class="w-full h-full object-cover"
                loading="lazy"
                onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'flex items-center justify-center h-full text-4xl\\'>📦</div>'">
              
              <!-- Points Badge -->
              ${p.feedback_points > 0 ? `
                <div class="absolute top-2 right-2 bg-gradient-to-r from-amber-500 to-orange-500 text-black text-xs font-bold px-2 py-1 rounded-md animate-pulse-slow">
                  🎁 ${p.feedback_points}
                </div>
              ` : ''}
              
              <!-- Rating -->
              ${p.review_rating > 0 ? `
                <div class="absolute bottom-2 left-2 bg-black/60 backdrop-blur text-xs px-2 py-1 rounded-md flex items-center gap-1">
                  ⭐ ${p.review_rating.toFixed(1)}
                  ${p.feedbacks > 0 ? `<span class="text-gray-400">(${p.feedbacks})</span>` : ''}
                </div>
              ` : ''}
            </div>
            
            <!-- Info -->
            <div class="p-3">
              <!-- Brand & Category -->
              <div class="flex items-center gap-2 mb-2 text-xs">
                ${p.brand ? `
                  <span class="bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded">
                    ${escapeHtml(p.brand)}
                  </span>
                ` : ''}
              </div>
              
              <!-- Name -->
              <h3 class="text-sm font-medium text-gray-200 line-clamp-2 mb-3 min-h-[2.5rem]">
                ${escapeHtml(p.name)}
              </h3>
              
              <!-- Price Row -->
              <div class="flex items-center justify-between">
                <div class="flex items-baseline gap-2">
                  <span class="text-lg font-bold text-green-400 price-glow">
                    ${formatPrice(p.sale_price || p.price)}₽
                  </span>
                  ${p.sale_price && p.price !== p.sale_price ? `
                    <span class="text-xs text-gray-500 line-through">
                      ${formatPrice(p.price)}₽
                    </span>
                  ` : ''}
                </div>
                
                ${p.feedback_points > 0 ? `
                  <span class="text-amber-400 font-bold text-sm points-glow">
                    +${p.feedback_points} 🎁
                  </span>
                ` : ''}
              </div>
              
              <!-- Seller -->
              ${p.seller ? `
                <div class="mt-2 text-xs text-gray-500 truncate" title="${escapeHtml(p.seller)}">
                  🏪 ${escapeHtml(p.seller)}
                </div>
              ` : ''}
            </div>
          </a>
        `).join('');

        // Pagination
        if (total > limit && !search) {
          const pages = Math.ceil(total / limit);
          pagination.innerHTML = `
            <button ${page === 0 ? 'disabled' : ''} 
              onclick="loadProducts('${tab}', '', ${page - 1})"
              class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm disabled:opacity-30 disabled:cursor-not-allowed hover:border-purple-500 transition-colors">
              ← Назад
            </button>
            <span class="text-gray-500 text-sm">
              ${page + 1} / ${pages}
            </span>
            <button ${page >= pages - 1 ? 'disabled' : ''} 
              onclick="loadProducts('${tab}', '', ${page + 1})"
              class="px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm disabled:opacity-30 disabled:cursor-not-allowed hover:border-purple-500 transition-colors">
              Вперёд →
            </button>
          `;
        }

      } catch (e) {
        container.innerHTML = `
          <div class="col-span-full text-center py-20 text-red-400">
            <div class="text-4xl mb-4">❌</div>
            <p>Ошибка: ${escapeHtml(e.message)}</p>
          </div>
        `;
      }
    }

    // Render history
    function renderHistory(data) {
      const container = document.getElementById('products');
      const countEl = document.getElementById('count');
      
      countEl.textContent = `История сканирований: ${data.length}`;

      if (data.length === 0) {
        container.innerHTML = `
          <div class="col-span-full text-center py-20 text-gray-500">
            <div class="text-4xl mb-4">📜</div>
            <p>История пуста</p>
          </div>
        `;
        return;
      }

      container.innerHTML = `
        <div class="col-span-full space-y-2">
          ${data.map(h => `
            <div class="flex items-center justify-between bg-gray-900/30 border border-gray-800 rounded-lg p-4">
              <div class="flex items-center gap-4">
                <span class="${h.status === 'success' ? 'text-green-400' : 'text-red-400'} text-xl">
                  ${h.status === 'success' ? '✓' : '✗'}
                </span>
                <div>
                  <div class="text-sm text-gray-300">${h.started_at}</div>
                  <div class="text-xs text-gray-500">
                    Товаров: <span class="text-gray-300">${h.products_found}</span>
                    · Новых: <span class="text-green-400">${h.new_products}</span>
                  </div>
                </div>
              </div>
              <span class="px-2 py-1 rounded text-xs font-medium ${h.status === 'success' ? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">
                ${h.status === 'success' ? 'Успех' : 'Ошибка'}
              </span>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active', 'bg-purple-600', 'text-white'));
        tab.classList.add('active', 'bg-purple-600', 'text-white');
        currentTab = tab.dataset.tab;
        currentPage = 0;
        document.getElementById('search').value = '';
        loadProducts(currentTab);
      });
    });

    // Search
    let searchTimeout;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        if (e.target.value.trim()) {
          loadProducts(null, e.target.value.trim());
        } else {
          loadProducts(currentTab);
        }
      }, 300);
    });

    // Min points filter
    document.getElementById('minPoints').addEventListener('change', (e) => {
      currentMinPoints = parseInt(e.target.value);
      currentPage = 0;
      loadProducts(currentTab);
    });

    // Init
    loadStats();
    loadProducts('new');

    // Refresh stats every minute
    setInterval(loadStats, 60000);
  </script>
</body>
</html>
